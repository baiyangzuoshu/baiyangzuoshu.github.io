name: Deploy Blog

on:
  push:
    branches:
      - main
    paths:
      - "blog/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy-blog
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: blog

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: blog/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Configure Git identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Deploy with Hexo
        env:
          HEXO_DEPLOYER_REPO: https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/baiyangzuoshu/baiyangzuoshu.github.io.git,master
        run: npx hexo deploy
