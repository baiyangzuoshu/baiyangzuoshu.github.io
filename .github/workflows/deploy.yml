name: Deploy Blog

on:
  push:
    branches:
      - main
    paths:
      - "blog/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy-blog
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: blog

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: blog/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build site
        env:
          GISCUS_REPO: ${{ secrets.GISCUS_REPO }}
          GISCUS_REPO_ID: ${{ secrets.GISCUS_REPO_ID }}
          GISCUS_CATEGORY: ${{ secrets.GISCUS_CATEGORY }}
          GISCUS_CATEGORY_ID: ${{ secrets.GISCUS_CATEGORY_ID }}
          GISCUS_MAPPING: ${{ secrets.GISCUS_MAPPING }}
          GISCUS_STRICT: ${{ secrets.GISCUS_STRICT }}
          GISCUS_REACTIONS_ENABLED: ${{ secrets.GISCUS_REACTIONS_ENABLED }}
          GISCUS_EMIT_METADATA: ${{ secrets.GISCUS_EMIT_METADATA }}
          GISCUS_INPUT_POSITION: ${{ secrets.GISCUS_INPUT_POSITION }}
          GISCUS_THEME: ${{ secrets.GISCUS_THEME }}
          GISCUS_LANG: ${{ secrets.GISCUS_LANG }}
          CLARITY_PROJECT_ID: ${{ secrets.CLARITY_PROJECT_ID }}
          CLARITY_SCRIPT_HOST: ${{ secrets.CLARITY_SCRIPT_HOST }}
        run: npm run build

      - name: Deploy with Hexo
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx hexo deploy --config _config.yml,_config.ci.yml
