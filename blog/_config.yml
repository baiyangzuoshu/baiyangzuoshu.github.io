# Hexo Configuration
## Docs: https://hexo.io/docs/configuration.html
## Source: https://github.com/hexojs/hexo/

# Site
title: 白杨左书
subtitle: 没有品性的丰满，知识就是伪装
description: 没有品性的丰满，知识就是伪装
keywords: 白杨左书,周刊,读书,算法,游戏开发,AI,藏书
author: 白杨左书
language: zh-CN
timezone: Asia/Shanghai

# URL
## Set your site url here. For example, if you use GitHub Page, set url as 'https://username.github.io/project'
url: https://baiyangzuoshu.github.io
permalink: :year/:month/:day/:title/
permalink_defaults:
pretty_urls:
  trailing_index: true # Set to false to remove trailing 'index.html' from permalinks
  trailing_html: true # Set to false to remove trailing '.html' from permalinks

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:
  - google678658672e446ee7.html

# Writing
new_post_name: :title.md # File name of new posts
default_layout: post
titlecase: false # Transform title into titlecase
external_link:
  enable: true # Open external links in new tab
  field: site # Apply to the whole site
  exclude: ""
filename_case: 0
render_drafts: false

post_asset_folder: true
marked:
  prependRoot: true
  postAsset: true

relative_link: false
future: true
syntax_highlighter: highlight.js
highlight:
  line_number: true
  auto_detect: false
  tab_replace: ""
  wrap: true
  hljs: false
prismjs:
  preprocess: true
  line_number: true
  tab_replace: ""

# Home page setting
# path: Root path for your blogs index page. (default = '')
# per_page: Posts displayed per page. (0 = disable pagination)
# order_by: Posts order. (Order by date descending by default)
index_generator:
  path: ""
  per_page: 10
  order_by: -date

# Category & Tag
default_category: uncategorized
category_map:
tag_map:

# Metadata elements
## https://developer.mozilla.org/en-US/docs/Web/HTML/Element/meta
meta_generator: true

feed:
  type: atom
  path: atom.xml
  limit: 20
  content_limit: 180
  content_limit_delim: " "
  order_by: -date
  autodiscovery: true
  icon: /images/2024/favicon32.ico

sitemap:
  path:
    - sitemap.xml
    - sitemap.txt
  rel: true
  tags: true
  categories: true

search:
  path: search.json
  field: post
  content: true
  format: striptags

comments:
  provider: giscus
  giscus:
    repo: baiyangzuoshu/baiyangzuoshu.github.io
    repo_id: R_kgDOM2uYIA # required: repository id from giscus app
    category: Announcements # recommended default discussion category
    category_id: DIC_kwDOM2uYIM4C5eW1 # required: category id from giscus app
    mapping: pathname
    strict: 0
    reactions_enabled: 1
    emit_metadata: 0
    input_position: bottom
    theme: preferred_color_scheme
    lang: zh-CN

analytics:
  provider: clarity
  clarity:
    project_id: w2upclgnjh # required: project id from Microsoft Clarity
    script_host: https://www.clarity.ms/tag/
  umami:
    script_url: https://cloud.umami.is/script.js
    website_id: ""
    domains: baiyangzuoshu.github.io
    host_url: ""
    auto_track: true
    do_not_track: true
    exclude_search: false
    exclude_hash: false
    performance: false
    tag: ""

indexnow:
  enable: true
  endpoint: https://api.indexnow.org/indexnow
  key: b10c0c69-d2f2-4b15-aa23-32eb47104762
  batch_size: 10000
  dry_run: false

# Date / Time format
## Hexo uses Moment.js to parse and display date
## You can customize the date format as defined in
## http://momentjs.com/docs/#/displaying/format/
date_format: YYYY-MM-DD
time_format: HH:mm:ss
## updated_option supports 'mtime', 'date', 'empty'
updated_option: "date"

# Pagination
## Set per_page to 0 to disable pagination
per_page: 10
pagination_dir: page
#
favicon: /images/2024/favicon32.ico

# Include / Exclude file(s)
## include:/exclude: options only apply to the 'source/' folder
include:
exclude:
ignore:

# Extensions
## Plugins: https://hexo.io/plugins/
## Themes: https://hexo.io/themes/
theme: landscape

# Deployment
## Docs: https://hexo.io/docs/one-command-deployment
deploy:
  type: git
  repo: git@github.com:baiyangzuoshu/baiyangzuoshu.github.io.git #https://bitbucket.org/JohnSmith/johnsmith.bitbucket.io
  branch: master #published

categories:
  - 周刊
  - 历史
  - Cocoscreator
  - 体育
  - 图形渲染
  - 读书
  - Skynet与Lua
  - 算法
  - 游戏开发
  - 思考
  - AI
  - 藏书
